<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <rect x="20" y="20" width="760" height="180" rx="10" fill="#e7f3ff" stroke="#0056b3" stroke-dasharray="5,5"/>
  <text x="40" y="45" font-family="Arial" font-size="14" font-weight="bold" fill="#0056b3">阶段 1：数据索引 (离线流程 - Data Indexing)</text>
  
  <rect x="40" y="70" width="100" height="60" rx="5" fill="#fff" stroke="#333"/>
  <text x="90" y="95" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">原始文档</text>
  <text x="90" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">(PDF/代码/Wiki)</text>
  
  <path d="M140 100 H180" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="180" y="70" width="100" height="60" rx="5" fill="#fff" stroke="#333"/>
  <text x="230" y="95" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">文本切分</text>
  <text x="230" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">(Chunking)</text>
  
  <path d="M280 100 H320" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="320" y="70" width="100" height="60" rx="5" fill="#fff" stroke="#333"/>
  <text x="370" y="95" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">向量化</text>
  <text x="370" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">(Embedding)</text>
  
  <path d="M420 100 H460" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <path d="M460 70 h120 v70 h-120 Z" fill="#d1e7dd" stroke="#0f5132"/>
  <text x="520" y="95" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#0f5132">向量数据库</text>
  <text x="520" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#0f5132">(Vector Store)</text>

  <rect x="20" y="220" width="760" height="260" rx="10" fill="#fff3cd" stroke="#856404" stroke-dasharray="5,5"/>
  <text x="40" y="245" font-family="Arial" font-size="14" font-weight="bold" fill="#856404">阶段 2：检索与生成 (在线流程 - RAG Pipeline)</text>
  
  <circle cx="90" cy="300" r="30" fill="#fff" stroke="#333"/>
  <text x="90" y="305" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">用户提问</text>
  
  <path d="M120 300 H160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="160" y="270" width="120" height="60" rx="5" fill="#fff" stroke="#333"/>
  <text x="220" y="295" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">语义检索</text>
  <text x="220" y="315" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">(Retrieval)</text>
  
  <path d="M520 140 V270" stroke="#0f5132" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
  <text x="530" y="200" font-family="Arial" font-size="11" fill="#0f5132">匹配 Top-K 文本块</text>
  
  <path d="M280 300 H320" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="320" y="270" width="140" height="60" rx="5" fill="#f8d7da" stroke="#842029"/>
  <text x="390" y="295" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#842029">Prompt 增强</text>
  <text x="390" y="315" text-anchor="middle" font-family="Arial" font-size="10" fill="#842029">(提问 + 参考资料)</text>
  
  <path d="M460 300 H500" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <ellipse cx="580" cy="300" rx="80" ry="40" fill="#e2e3e5" stroke="#383d41"/>
  <text x="580" y="305" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">LLM (大模型)</text>
  
  <path d="M660 300 H700" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="700" y="270" width="70" height="60" rx="15" fill="#cfe2ff" stroke="#084298"/>
  <text x="735" y="305" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#084298">回答</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
</svg>
